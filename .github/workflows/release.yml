name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v6.2.0). The tag must already exist on the default branch."
        required: true
      draft:
        description: "Publish as draft"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_VERSION: "6.8.1"
  QT5_VERSION: "5.15.2"
  NDK_VERSION: "26.1.10909125"

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      ref: ${{ steps.resolve.outputs.ref }}
      draft: ${{ steps.resolve.outputs.draft }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            DRAFT="${{ github.event.inputs.draft }}"
          else
            TAG="${GITHUB_REF_NAME}"
            DRAFT="false"
          fi
          [[ "$TAG" == v* ]] || { echo "tag must start with 'v' (got: $TAG)"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

  test:
    name: Go test + svelte-check
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: wails/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wails/frontend/package-lock.json

      - name: go vet + test
        working-directory: wails
        run: |
          go vet ./...
          go test ./... -count=1

      - name: svelte-check
        working-directory: wails/frontend
        run: |
          npm ci || npm install
          npm run check

  wails:
    name: Wails (${{ matrix.label }})
    needs: [prepare, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            platform: linux/amd64
          - os: windows-latest
            label: windows-amd64
            platform: windows/amd64
          - os: macos-latest
            label: darwin-universal
            platform: darwin/universal
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: wails/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wails/frontend/package-lock.json

      - name: Install Linux WebKit/GTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            zip

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: wails build
        working-directory: wails
        shell: bash
        run: wails build -clean -s -platform ${{ matrix.platform }}

      - name: Package
        id: pkg
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          cd wails/build/bin
          OUT="dukto-wails-${VERSION}-${LABEL}"
          case "$RUNNER_OS" in
            Linux)
              tar -czf "../${OUT}.tar.gz" *
              echo "path=wails/build/${OUT}.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            Windows)
              7z a -tzip "../${OUT}.zip" ./* >/dev/null
              echo "path=wails/build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
            macOS)
              ditto -c -k --sequesterRsrc --keepParent *.app "../${OUT}.zip"
              echo "path=wails/build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: release-wails-${{ matrix.label }}
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  qt6:
    name: Qt6 (${{ matrix.label }})
    needs: [prepare, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            arch: ""
          - os: windows-latest
            label: windows-amd64
            arch: win64_msvc2022_64
          - os: macos-latest
            label: darwin-universal
            arch: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: ${{ matrix.arch }}
          cache: true

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libnotify-dev

      - name: Configure MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUSE_SINGLE_APP=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Package
        id: pkg
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          OUT="dukto-qt6-${VERSION}-${LABEL}"
          case "$RUNNER_OS" in
            Linux)
              tar -czf "build/${OUT}.tar.gz" -C build dukto
              echo "path=build/${OUT}.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            Windows)
              7z a -tzip "build/${OUT}.zip" ./build/Release/dukto.exe >/dev/null
              echo "path=build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
            macOS)
              ditto -c -k --sequesterRsrc --keepParent build/dukto.app "build/${OUT}.zip"
              echo "path=build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: release-qt6-${{ matrix.label }}
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  qt5:
    name: Qt5 (linux-amd64)
    needs: [prepare, test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - name: Install Qt 5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT5_VERSION }}
          host: linux
          target: desktop
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libnotify-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUSE_SINGLE_APP=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        id: pkg
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          OUT="dukto-qt5-${VERSION}-linux-amd64.tar.gz"
          tar -czf "build/${OUT}" -C build dukto
          echo "path=build/${OUT}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-qt5-linux-amd64
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  android:
    name: Android (${{ matrix.abi }})
    needs: [prepare, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64_v8a, armv7]
    env:
      QT_INSTALL_DIR: ${{ github.workspace }}/Qt
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Qt 6 desktop (host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          dir: ${{ env.QT_INSTALL_DIR }}
          cache: true

      - name: Install Qt 6 Android
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_${{ matrix.abi }}
          dir: ${{ env.QT_INSTALL_DIR }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;${{ env.NDK_VERSION }}"

      - name: Configure
        run: |
          set -euo pipefail
          QT_ANDROID_CMAKE="${QT_INSTALL_DIR}/Qt/${QT_VERSION}/android_${{ matrix.abi }}/bin/qt-cmake"
          NDK_ROOT="${ANDROID_HOME}/ndk/${NDK_VERSION}"
          test -x "$QT_ANDROID_CMAKE" || { echo "qt-cmake not found at $QT_ANDROID_CMAKE"; exit 1; }
          "$QT_ANDROID_CMAKE" \
            -S . -B build \
            -DANDROID_NDK_ROOT="$NDK_ROOT" \
            -DANDROID_SDK_ROOT="$ANDROID_HOME" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Locate APK
        id: pkg
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          APK="$(find build -type f -name '*.apk' | head -n1)"
          test -n "$APK" || { echo "no APK built"; exit 1; }
          OUT="dukto-android-${VERSION}-${{ matrix.abi }}.apk"
          cp "$APK" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-android-${{ matrix.abi }}
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: [prepare, wails, qt6, qt5, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          DRAFT_FLAG: ${{ needs.prepare.outputs.draft == 'true' && '--draft' || '' }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — uploading artifacts"
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" \
              --title "Dukto ${VERSION}" \
              --generate-notes \
              $DRAFT_FLAG \
              artifacts/*
          fi
