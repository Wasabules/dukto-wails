name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v6.2.0). The tag must already exist on the default branch."
        required: true
      draft:
        description: "Publish as draft"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_VERSION: "6.8.1"
  QT5_VERSION: "5.15.2"
  NDK_VERSION: "26.1.10909125"

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      ref: ${{ steps.resolve.outputs.ref }}
      draft: ${{ steps.resolve.outputs.draft }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            DRAFT="${{ github.event.inputs.draft }}"
          else
            TAG="${GITHUB_REF_NAME}"
            DRAFT="false"
          fi
          [[ "$TAG" == v* ]] || { echo "tag must start with 'v' (got: $TAG)"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

  test:
    name: Go test + svelte-check
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: wails/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wails/frontend/package-lock.json

      # main.go embeds frontend/dist; placeholder lets go vet/test compile
      # without building the SPA (covered by build-wails / svelte-check).
      - name: Seed frontend/dist placeholder
        working-directory: wails
        run: mkdir -p frontend/dist && touch frontend/dist/.placeholder

      - name: go vet + test
        working-directory: wails
        run: |
          go vet ./...
          go test ./... -count=1

      - name: svelte-check
        working-directory: wails/frontend
        run: |
          npm ci || npm install
          npm run check

  wails:
    name: Wails (${{ matrix.label }})
    needs: [prepare, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            platform: linux/amd64
          - os: windows-latest
            label: windows-amd64
            platform: windows/amd64
          - os: macos-latest
            label: darwin-universal
            platform: darwin/universal
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: wails/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wails/frontend/package-lock.json

      - name: Install Linux WebKit/GTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            zip

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: wails build
        working-directory: wails
        shell: bash
        run: |
          TAGS=""
          if [[ "$RUNNER_OS" == "Linux" ]]; then TAGS="-tags webkit2_41"; fi
          wails build -clean -s -platform ${{ matrix.platform }} $TAGS

      - name: Package
        id: pkg
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          cd wails/build/bin
          OUT="dukto-wails-${VERSION}-${LABEL}"
          case "$RUNNER_OS" in
            Linux)
              tar -czf "../${OUT}.tar.gz" *
              echo "path=wails/build/${OUT}.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            Windows)
              7z a -tzip "../${OUT}.zip" ./* >/dev/null
              echo "path=wails/build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
            macOS)
              ditto -c -k --sequesterRsrc --keepParent *.app "../${OUT}.zip"
              echo "path=wails/build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: release-wails-${{ matrix.label }}
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  qt6:
    name: Qt6 (${{ matrix.label }})
    needs: [prepare, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            arch: ""
          - os: windows-latest
            label: windows-amd64
            arch: win64_msvc2022_64
          - os: macos-latest
            label: darwin-universal
            arch: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: ${{ matrix.arch }}
          cache: true

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libnotify-dev

      - name: Configure MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUSE_SINGLE_APP=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Bundle Qt (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/deploy
          cp build/Release/dukto.exe build/deploy/
          windeployqt --release --no-translations --qmldir qml/new build/deploy/dukto.exe

      - name: Bundle Qt (macOS)
        if: runner.os == 'macOS'
        run: macdeployqt build/dukto.app -qmldir=qml/new

      - name: Bundle Qt (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          # GHA runners don't expose FUSE; force AppImages to extract+run.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          LD_DIR="$RUNNER_TEMP/linuxdeploy"
          mkdir -p "$LD_DIR"
          curl -fsSL -o "$LD_DIR/linuxdeploy.AppImage" \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          # linuxdeploy discovers plugins on PATH by exact name
          # (linuxdeploy-plugin-qt, no extension).
          curl -fsSL -o "$LD_DIR/linuxdeploy-plugin-qt" \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          # AppImageKit's appimagetool (used to build the final AppImage with
          # gzip compression — see comment below).
          curl -fsSL -o "$LD_DIR/appimagetool" \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$LD_DIR"/*
          # The repo's dukto.desktop hardcodes Exec=/usr/bin/dukto and
          # carries the non-standard "Application" category — generate a
          # relocatable, AppImage-friendly desktop file in build/.
          cat > build/dukto.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Dukto
          Comment=Easy and multi-platform file transfer tool
          Exec=dukto
          Icon=dukto
          Terminal=false
          Categories=Network;
          EOF
          export PATH="$LD_DIR:$PATH"
          # Dukto's QML sources are compiled into the binary as a Qt
          # resource (qml.qrc), so linuxdeploy-plugin-qt's static analysis
          # of the binary cannot see "import QtQuick.Controls" etc. Point
          # it at the on-disk QML tree so it bundles the right modules.
          export QML_SOURCES_PATHS="$GITHUB_WORKSPACE/qml/new:$GITHUB_WORKSPACE/qml/common"
          # Build AppDir only — don't let linuxdeploy run its bundled
          # appimagetool. Its current default is zstd compression, which
          # the AppImage runtime baked into the produced binary cannot
          # decompress ("Squashfs image uses (null) compression"), so the
          # resulting AppImage refuses to launch on any host.
          "$LD_DIR/linuxdeploy.AppImage" \
            --appdir build/AppDir \
            --executable build/dukto \
            --desktop-file build/dukto.desktop \
            --icon-file dukto.png \
            --plugin qt
          # Pack the AppDir with gzip compression — universally supported
          # by every released AppImage runtime.
          ARCH=x86_64 "$LD_DIR/appimagetool" --comp gzip --no-appstream \
            build/AppDir build/dukto-linux-amd64.AppImage

      - name: Package
        id: pkg
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          OUT="dukto-qt6-${VERSION}-${LABEL}"
          case "$RUNNER_OS" in
            Linux)
              mv build/dukto-linux-amd64.AppImage "build/${OUT}.AppImage"
              echo "path=build/${OUT}.AppImage" >> "$GITHUB_OUTPUT"
              ;;
            Windows)
              cd build/deploy && 7z a -tzip "../${OUT}.zip" ./* >/dev/null
              echo "path=build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
            macOS)
              ditto -c -k --sequesterRsrc --keepParent build/dukto.app "build/${OUT}.zip"
              echo "path=build/${OUT}.zip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: release-qt6-${{ matrix.label }}
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  qt5:
    name: Qt5 (linux-amd64)
    needs: [prepare, test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - name: Install Qt 5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT5_VERSION }}
          host: linux
          target: desktop
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libnotify-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUSE_SINGLE_APP=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Bundle Qt (linuxdeploy + AppImage)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          LD_DIR="$RUNNER_TEMP/linuxdeploy"
          mkdir -p "$LD_DIR"
          curl -fsSL -o "$LD_DIR/linuxdeploy.AppImage" \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o "$LD_DIR/linuxdeploy-plugin-qt" \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          curl -fsSL -o "$LD_DIR/appimagetool" \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$LD_DIR"/*
          cat > build/dukto.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Dukto
          Comment=Easy and multi-platform file transfer tool
          Exec=dukto
          Icon=dukto
          Terminal=false
          Categories=Network;
          EOF
          export PATH="$LD_DIR:$PATH"
          # Dukto's QML sources are loaded from a Qt resource (qml.qrc);
          # point the Qt plugin at the on-disk QML tree so it can detect
          # which modules to bundle.
          export QML_SOURCES_PATHS="$GITHUB_WORKSPACE/qml/new:$GITHUB_WORKSPACE/qml/common"
          # See qt6 job — linuxdeploy builds the AppDir; appimagetool packs
          # it with gzip (linuxdeploy's bundled appimagetool defaults to
          # zstd, which the AppImage runtime can't decompress).
          "$LD_DIR/linuxdeploy.AppImage" \
            --appdir build/AppDir \
            --executable build/dukto \
            --desktop-file build/dukto.desktop \
            --icon-file dukto.png \
            --plugin qt
          ARCH=x86_64 "$LD_DIR/appimagetool" --comp gzip --no-appstream \
            build/AppDir build/dukto-linux-amd64.AppImage

      - name: Package
        id: pkg
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          OUT="dukto-qt5-${VERSION}-linux-amd64.AppImage"
          mv build/dukto-linux-amd64.AppImage "build/${OUT}"
          echo "path=build/${OUT}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-qt5-linux-amd64
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  android:
    name: Android (${{ matrix.abi }})
    needs: [prepare, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64_v8a, armv7]
    env:
      QT_INSTALL_DIR: ${{ github.workspace }}/Qt
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Qt 6 desktop (host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          dir: ${{ env.QT_INSTALL_DIR }}
          cache: true

      - name: Install Qt 6 Android
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_${{ matrix.abi }}
          dir: ${{ env.QT_INSTALL_DIR }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;${{ env.NDK_VERSION }}"

      - name: Configure
        run: |
          set -euo pipefail
          QT_ANDROID_BIN="${QT_INSTALL_DIR}/Qt/${QT_VERSION}/android_${{ matrix.abi }}/bin"
          QT_HOST_BIN="${QT_INSTALL_DIR}/Qt/${QT_VERSION}/gcc_64/bin"
          # jurplel/install-qt-action's cache occasionally drops the +x bit
          # on the Android arch tarball (seen on armv7).
          chmod -R +x "$QT_ANDROID_BIN" "$QT_HOST_BIN"
          QT_ANDROID_CMAKE="$QT_ANDROID_BIN/qt-cmake"
          NDK_ROOT="${ANDROID_HOME}/ndk/${NDK_VERSION}"
          test -f "$QT_ANDROID_CMAKE" || { echo "qt-cmake not found at $QT_ANDROID_CMAKE"; exit 1; }
          "$QT_ANDROID_CMAKE" \
            -S . -B build \
            -DANDROID_NDK_ROOT="$NDK_ROOT" \
            -DANDROID_SDK_ROOT="$ANDROID_HOME" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Locate APK
        id: pkg
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          APK="$(find build -type f -name '*.apk' | head -n1)"
          test -n "$APK" || { echo "no APK built"; exit 1; }
          OUT="dukto-android-${VERSION}-${{ matrix.abi }}.apk"
          cp "$APK" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-android-${{ matrix.abi }}
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: [prepare, wails, qt6, qt5, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          DRAFT_FLAG: ${{ needs.prepare.outputs.draft == 'true' && '--draft' || '' }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — uploading artifacts"
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" \
              --title "Dukto ${VERSION}" \
              --generate-notes \
              $DRAFT_FLAG \
              artifacts/*
          fi
