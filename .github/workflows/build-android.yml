name: build-android

on:
  push:
    branches: [master]
    paths-ignore:
      - "wails/**"
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "wails/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: android-${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64_v8a, armv7]
    env:
      QT_VERSION: "6.8.1"
      QT_INSTALL_DIR: ${{ github.workspace }}/Qt
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Qt 6 desktop (host tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          dir: ${{ env.QT_INSTALL_DIR }}
          cache: true

      - name: Install Qt 6 Android
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_${{ matrix.abi }}
          dir: ${{ env.QT_INSTALL_DIR }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125"

      - name: Configure
        run: |
          set -euo pipefail
          QT_ANDROID_CMAKE="${QT_INSTALL_DIR}/Qt/${QT_VERSION}/android_${{ matrix.abi }}/bin/qt-cmake"
          NDK_ROOT="${ANDROID_HOME}/ndk/26.1.10909125"
          test -x "$QT_ANDROID_CMAKE" || { echo "qt-cmake not found at $QT_ANDROID_CMAKE"; ls -R "${QT_INSTALL_DIR}" | head -80; exit 1; }
          "$QT_ANDROID_CMAKE" \
            -S . -B build \
            -DANDROID_NDK_ROOT="$NDK_ROOT" \
            -DANDROID_SDK_ROOT="$ANDROID_HOME" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dukto-android-${{ matrix.abi }}
          path: |
            build/android-build/**/*.apk
            build/**/*.apk
          if-no-files-found: warn
          retention-days: 7
