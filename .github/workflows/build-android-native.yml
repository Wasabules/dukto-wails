name: build-android-native

on:
  push:
    branches: [master]
    paths:
      - "android-native/**"
      - ".github/workflows/build-android-native.yml"
  pull_request:
    paths:
      - "android-native/**"
      - ".github/workflows/build-android-native.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: native-android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew test

      - name: Assemble debug + unsigned release
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dukto-android-native-debug
          path: android-native/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: dukto-android-native-release-unsigned
          path: android-native/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
