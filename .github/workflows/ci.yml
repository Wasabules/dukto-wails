name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: go test (wails/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: wails/go.sum

      # main.go has //go:embed all:frontend/dist; the pattern needs at least
      # one matching file at compile time even for `go vet`/`go test`. We
      # don't actually exercise the embedded SPA in Go tests.
      - name: Seed frontend/dist placeholder
        working-directory: wails
        run: mkdir -p frontend/dist && touch frontend/dist/.placeholder

      - name: go vet
        working-directory: wails
        run: go vet ./...

      - name: go test
        working-directory: wails
        run: go test ./... -count=1

  svelte-check:
    name: svelte-check (wails/frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wails/frontend/package-lock.json

      - name: npm ci
        working-directory: wails/frontend
        run: npm ci || npm install

      - name: svelte-check
        working-directory: wails/frontend
        run: npm run check
